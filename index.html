<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ChordSync Live</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="splash-screen" class="screen flex-center">
        <div class="splash-content">
            <div class="app-icon-placeholder">🎵</div>
            <h1 class="splash-title">ChordSync Live</h1>
            <p class="splash-creator">Creado por <strong>Tu Nombre / Empresa</strong></p>
            <div class="splash-loader"></div>
        </div>
    </div>

    <div id="auth-screen" class="screen flex-center hidden">
        <div class="auth-box">
            <h2>Ingresar al Sistema</h2>
            <p>Introduce tu nombre o instrumento para sincronizarte</p>
            <input type="text" id="username-input" placeholder="Ej. Director, Teclado, Guitarra...">
            <button id="btn-enter" class="btn btn-primary">Ingresar</button>
        </div>
    </div>

    <div id="app-screen" class="screen hidden">
        
        <header class="main-header">
            <div class="user-badge">
                <span id="display-user-name">Usuario</span>
            </div>
            <div class="live-status-container">
                <button id="btn-live-toggle" class="btn btn-danger btn-live">🔴 LIVE</button>
                <div id="live-banner" class="live-banner hidden">
                    <span class="pulse-dot"></span> LIVE: <strong id="live-director-name">-</strong>
                    <button id="btn-join-live" class="btn btn-accent btn-sm">UNIRME</button>
                </div>
            </div>
        </header>

        <nav id="main-nav" class="main-nav">
            <button class="nav-link active" data-target="section-visor">Visor</button>
            <button class="nav-link" data-target="section-songs">Canciones</button>
            <button class="nav-link" data-target="section-repertoires">Repertorios</button>
        </nav>

        <main class="content-area">

            <section id="section-visor" class="tab-content active">
                <div class="visor-controls">
                    <div class="control-group">
                        <label>Instrumento:</label>
                        <select id="select-instrument">
                            <option value="none">Solo Nombre</option>
                            <option value="guitar">Guitarra</option>
                            <option value="piano">Piano</option>
                            <option value="charango">Charango</option>
                            <option value="ukulele">Ukelele</option>
                        </select>
                    </div>
                    <div class="control-group toggle-group">
                        <label for="switch-follow">Seguir Director</label>
                        <input type="checkbox" id="switch-follow" checked>
                    </div>
                </div>

                <div id="active-section-indicator" class="active-section-indicator hidden">
                    SECCIÓN ACTIVA: <span id="current-active-section-name">-</span>
                </div>

                <div id="visor-canvas" class="visor-canvas">
                    <div class="song-meta-header">
                        <div>
                            <h1 id="visor-title">Selecciona una canción</h1>
                            <h3 id="visor-author-group">Autor / Cantante</h3>
                        </div>
                        <div class="music-specs">
                            <div>Tonalidad: <span id="visor-key">-</span></div>
                            <div>Compás: <span id="visor-signature">-</span></div>
                            <div>Tempo: <span id="visor-bpm">-</span> BPM</div>
                        </div>
                    </div>
                    
                    <div id="chords-grid" class="chords-grid"></div>
                </div>
            </section>

            <section id="section-songs" class="tab-content hidden">
                <div class="section-action-header">
                    <input type="text" id="search-song" placeholder="Buscar canción...">
                    <button id="btn-new-song" class="btn btn-primary">+ Nueva Canción</button>
                </div>
                <div id="songs-list" class="item-list"></div>

                <div id="song-form-container" class="form-container hidden">
                    <h2 id="form-song-title">Nueva Canción</h2>
                    <form id="song-form">
                        <input type="hidden" id="form-song-id">
                        <div class="form-row">
                            <input type="text" id="form-title" placeholder="Título *" required>
                            <input type="text" id="form-author" placeholder="Autor *" required>
                        </div>
                        <div class="form-row">
                            <input type="text" id="form-group" placeholder="Grupo o Cantante">
                            <input type="text" id="form-key" placeholder="Tonalidad (Ej: C, Am)" required>
                        </div>
                        <div class="form-row">
                            <input type="text" id="form-signature" placeholder="Compás" value="4/4">
                            <input type="number" id="form-bpm" placeholder="BPM" value="80">
                        </div>
                        <textarea id="form-raw-chords" rows="5" placeholder=":INTRO C_major G_major..." required></textarea>
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">Guardar</button>
                            <button type="button" id="btn-cancel-song" class="btn btn-secondary">Cancelar</button>
                        </div>
                    </form>
                </div>
            </section>

            <section id="section-repertoires" class="tab-content hidden">
                <div class="section-action-header">
                    <input type="text" id="new-repertoire-name" placeholder="Nombre de repertorio...">
                    <button id="btn-create-repertoire" class="btn btn-primary">Crear</button>
                </div>
                <div id="repertoires-list" class="item-list"></div>
            </section>

        </main>

        <button id="btn-floating-exit-live" class="btn-floating-exit hidden">
            ✕ Salir del LIVE
        </button>
    </div>

    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
          "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
        }
      }
    </script>
    <script src="js/chords-db.js"></script>
    <script type="module" src="js/firebase.js"></script>
    <script type="module" src="js/songs.js"></script>
    <script type="module" src="js/repertoire.js"></script>
    <script type="module" src="js/live.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
